name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: 'Antyp Hub v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false

      - name: Upload updater artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          BUNDLE="src-tauri/target/release/bundle"

          NSIS_ZIP="${BUNDLE}/nsis/AntypHub_${VERSION}_x64-setup.nsis.zip"
          NSIS_SIG="${NSIS_ZIP}.sig"

          gh release upload "v${VERSION}" "${NSIS_ZIP}" "${NSIS_SIG}" --clobber

          SIG_CONTENT=$(cat "${NSIS_SIG}")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Antyp Hub v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG_CONTENT}",
                "url": "https://github.com/YehorKuznetsov/AntypHub/releases/download/v${VERSION}/AntypHub_${VERSION}_x64-setup.nsis.zip"
              }
            }
          }
          ENDJSON

          gh release upload "v${VERSION}" latest.json --clobber
