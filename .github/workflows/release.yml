name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Create release and upload artifacts
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $bundle = "src-tauri/target/release/bundle"

          Write-Host "=== Bundle contents ==="
          Get-ChildItem -Recurse $bundle -File | ForEach-Object { Write-Host $_.FullName }

          $nsisExe = (Get-ChildItem "$bundle/nsis/*-setup.exe")[0]
          $nsisZip = (Get-ChildItem "$bundle/nsis/*-setup.nsis.zip")[0]
          $nsisZipSig = (Get-ChildItem "$bundle/nsis/*-setup.nsis.zip.sig")[0]
          $msi = (Get-ChildItem "$bundle/msi/*.msi" | Where-Object { $_.Name -notmatch '\.zip$' })[0]

          if (-not $nsisZipSig) {
            Write-Host "ERROR: .nsis.zip.sig not found"
            exit 1
          }

          $sigContent = (Get-Content $nsisZipSig.FullName -Raw).Trim()
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $json = @{
            version = $version
            notes = "Antyp Hub v$version"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sigContent
                url = "https://github.com/YehorKuznetsov/AntypHub/releases/download/v$version/$($nsisZip.Name)"
              }
            }
          } | ConvertTo-Json -Depth 4

          Set-Content -Path latest.json -Value $json -Encoding utf8NoBOM

          gh release create "v$version" `
            --title "Antyp Hub v$version" `
            --notes "See the assets to download and install this version." `
            $nsisExe.FullName `
            $msi.FullName `
            $nsisZip.FullName `
            $nsisZipSig.FullName `
            latest.json
