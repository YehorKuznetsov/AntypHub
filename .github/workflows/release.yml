name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: 'Antyp Hub v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false

      - name: Install minisign and create updater artifacts
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $version = (Get-Content src-tauri\tauri.conf.json | ConvertFrom-Json).version
          $bundle = "src-tauri\target\release\bundle"
          $nsisExe = Get-ChildItem "$bundle\nsis\*-setup.exe" | Select-Object -First 1

          if (-not $nsisExe) {
            Write-Host "ERROR: No setup.exe found"
            exit 1
          }

          # Create nsis zip
          $zipName = $nsisExe.BaseName + ".nsis.zip"
          $zipPath = Join-Path $nsisExe.DirectoryName $zipName
          Compress-Archive -Path $nsisExe.FullName -DestinationPath $zipPath -Force

          # Write key to file and sign with minisign via tauri signer
          $keyPath = "$env:RUNNER_TEMP\signing.key"
          [System.IO.File]::WriteAllText($keyPath, $env:TAURI_SIGNING_PRIVATE_KEY)

          # Use cargo to install tauri-cli and sign
          cargo install tauri-cli --version "^2" 2>$null
          cargo tauri signer sign --private-key-path $keyPath --password "" $zipPath

          $sigPath = "$zipPath.sig"
          if (-not (Test-Path $sigPath)) {
            Write-Host "ERROR: Signing failed, no .sig file"
            exit 1
          }

          $sigContent = (Get-Content $sigPath -Raw).Trim()
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $json = @{
            version = $version
            notes = "Antyp Hub v$version"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sigContent
                url = "https://github.com/YehorKuznetsov/AntypHub/releases/download/v$version/$zipName"
              }
            }
          } | ConvertTo-Json -Depth 4

          Set-Content -Path latest.json -Value $json -Encoding utf8NoBOM

          gh release upload "v$version" $zipPath $sigPath latest.json --clobber
          Write-Host "Uploaded: $zipName, sig, and latest.json"
