name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: 'Antyp Hub v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false

      - name: Upload updater artifacts
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $bundle = "src-tauri/target/release/bundle"

          Write-Host "=== Bundle contents ==="
          Get-ChildItem -Recurse $bundle | ForEach-Object { Write-Host $_.FullName }

          $nsisZip = Get-ChildItem "$bundle/nsis/*-setup.nsis.zip" | Select-Object -First 1
          $nsisZipSig = Get-ChildItem "$bundle/nsis/*-setup.nsis.zip.sig" | Select-Object -First 1

          if (-not $nsisZip -or -not $nsisZipSig) {
            Write-Host "ERROR: nsis.zip or .sig not found"
            exit 1
          }

          $sigContent = Get-Content $nsisZipSig.FullName -Raw
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $nsisZipName = $nsisZip.Name

          $json = @{
            version = $version
            notes = "Antyp Hub v$version"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sigContent.Trim()
                url = "https://github.com/YehorKuznetsov/AntypHub/releases/download/v$version/$nsisZipName"
              }
            }
          } | ConvertTo-Json -Depth 4

          $json | Out-File -Encoding utf8 latest.json

          gh release upload "v$version" $nsisZip.FullName --clobber
          gh release upload "v$version" $nsisZipSig.FullName --clobber
          gh release upload "v$version" latest.json --clobber
