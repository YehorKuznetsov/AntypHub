name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          Write-Host "Key env length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          npx tauri build

      - name: List bundle contents
        shell: pwsh
        run: Get-ChildItem -Recurse src-tauri\target\release\bundle -File | ForEach-Object { Write-Host $_.FullName }

      - name: Create release and upload artifacts
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri\tauri.conf.json | ConvertFrom-Json).version
          $bundle = "src-tauri\target\release\bundle"

          $nsisExe = Get-ChildItem "$bundle\nsis\*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsisZip = Get-ChildItem "$bundle\nsis\*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsisZipSig = Get-ChildItem "$bundle\nsis\*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $msi = Get-ChildItem "$bundle\msi\*.msi" -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch '\.(zip|sig)$' } | Select-Object -First 1

          $assets = @()
          if ($nsisExe) { $assets += $nsisExe.FullName }
          if ($msi) { $assets += $msi.FullName }

          if ($nsisZipSig -and $nsisZip) {
            $sigContent = (Get-Content $nsisZipSig.FullName -Raw).Trim()
            $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

            $json = @{
              version = $version
              notes = "Antyp Hub v$version"
              pub_date = $pubDate
              platforms = @{
                "windows-x86_64" = @{
                  signature = $sigContent
                  url = "https://github.com/YehorKuznetsov/AntypHub/releases/download/v$version/$($nsisZip.Name)"
                }
              }
            } | ConvertTo-Json -Depth 4

            Set-Content -Path latest.json -Value $json -Encoding utf8NoBOM
            $assets += $nsisZip.FullName
            $assets += $nsisZipSig.FullName
            $assets += "latest.json"
            Write-Host "Updater JSON created"
          } else {
            Write-Host "WARNING: No .nsis.zip.sig found - updater JSON skipped"
          }

          $assetArgs = $assets | ForEach-Object { "`"$_`"" }
          Invoke-Expression "gh release create `"v$version`" --title `"Antyp Hub v$version`" --notes `"See the assets to download and install this version.`" $($assetArgs -join ' ')"
